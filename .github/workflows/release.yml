name: Release TVGate

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform:
          # ==================== 新命名 规范====================
          - linux-64
          - linux-arm64-v8a
          - linux-arm32-v7a
          - linux-arm32-v6
          - linux-arm32-v5
          - linux-32
          - linux-loong64
          - linux-mips32
          - linux-mips32le
          - linux-mips64
          - linux-mips64le
          - linux-ppc64
          - linux-ppc64le
          - linux-riscv64
          - linux-s390x
          - windows-64
          - windows-32
          - windows-arm64-v8a
          - macos-64
          - macos-arm64-v8a
          - android-arm64-v8a
          # ==================== 旧命名 (兼容旧版本升级) ====================
          - linux-amd64
          - linux-arm64
          - linux-armv7
          - linux-armv6
          - linux-386
          - windows-amd64
          - windows-386
          - windows-arm64
          - darwin-amd64
          - darwin-arm64
          - android-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Set environment variables
        run: |
          VERSION=$(cat config/version 2>/dev/null || echo "latest")
          case "${{ matrix.platform }}" in
            # ==================== 新命名 ====================
            linux-64)          GOOS=linux; GOARCH=amd64;     PACKAGE_OS=linux;   PACKAGE_ARCH=64 ;;
            linux-arm64-v8a)   GOOS=linux; GOARCH=arm64;     PACKAGE_OS=linux;   PACKAGE_ARCH=arm64-v8a ;;
            linux-arm32-v7a)   GOOS=linux; GOARCH=arm; GOARM=7; PACKAGE_OS=linux; PACKAGE_ARCH=arm32-v7a ;;
            linux-arm32-v6)    GOOS=linux; GOARCH=arm; GOARM=6; PACKAGE_OS=linux; PACKAGE_ARCH=arm32-v6 ;;
            linux-arm32-v5)    GOOS=linux; GOARCH=arm; GOARM=5; PACKAGE_OS=linux; PACKAGE_ARCH=arm32-v5 ;;
            linux-32)          GOOS=linux; GOARCH=386;       PACKAGE_OS=linux;   PACKAGE_ARCH=32 ;;
            linux-loong64)     GOOS=linux; GOARCH=loong64;   PACKAGE_OS=linux;   PACKAGE_ARCH=loong64 ;;
            linux-mips32)      GOOS=linux; GOARCH=mips;      PACKAGE_OS=linux;   PACKAGE_ARCH=mips32 ;;
            linux-mips32le)    GOOS=linux; GOARCH=mipsle;    PACKAGE_OS=linux;   PACKAGE_ARCH=mips32le ;;
            linux-mips64)      GOOS=linux; GOARCH=mips64;    PACKAGE_OS=linux;   PACKAGE_ARCH=mips64 ;;
            linux-mips64le)    GOOS=linux; GOARCH=mips64le;  PACKAGE_OS=linux;   PACKAGE_ARCH=mips64le ;;
            linux-ppc64)       GOOS=linux; GOARCH=ppc64;     PACKAGE_OS=linux;   PACKAGE_ARCH=ppc64 ;;
            linux-ppc64le)     GOOS=linux; GOARCH=ppc64le;   PACKAGE_OS=linux;   PACKAGE_ARCH=ppc64le ;;
            linux-riscv64)     GOOS=linux; GOARCH=riscv64;   PACKAGE_OS=linux;   PACKAGE_ARCH=riscv64 ;;
            linux-s390x)       GOOS=linux; GOARCH=s390x;     PACKAGE_OS=linux;   PACKAGE_ARCH=s390x ;;
            windows-64)        GOOS=windows; GOARCH=amd64;   PACKAGE_OS=windows; PACKAGE_ARCH=64 ;;
            windows-32)        GOOS=windows; GOARCH=386;     PACKAGE_OS=windows; PACKAGE_ARCH=32 ;;
            windows-arm64-v8a) GOOS=windows; GOARCH=arm64;   PACKAGE_OS=windows; PACKAGE_ARCH=arm64-v8a ;;
            macos-64)          GOOS=darwin; GOARCH=amd64;    PACKAGE_OS=macos;   PACKAGE_ARCH=64 ;;
            macos-arm64-v8a)   GOOS=darwin; GOARCH=arm64;    PACKAGE_OS=macos;   PACKAGE_ARCH=arm64-v8a ;;
            android-arm64-v8a) GOOS=android; GOARCH=arm64;   PACKAGE_OS=android; PACKAGE_ARCH=arm64-v8a ;;
            # ==================== 旧命名 ====================
            linux-amd64)       GOOS=linux; GOARCH=amd64;     PACKAGE_OS=linux;   PACKAGE_ARCH=amd64 ;;
            linux-arm64)       GOOS=linux; GOARCH=arm64;     PACKAGE_OS=linux;   PACKAGE_ARCH=arm64 ;;
            linux-armv7)       GOOS=linux; GOARCH=arm; GOARM=7; PACKAGE_OS=linux; PACKAGE_ARCH=armv7 ;;
            linux-armv6)       GOOS=linux; GOARCH=arm; GOARM=6; PACKAGE_OS=linux; PACKAGE_ARCH=armv6 ;;
            linux-386)         GOOS=linux; GOARCH=386;       PACKAGE_OS=linux;   PACKAGE_ARCH=386 ;;
            windows-amd64)     GOOS=windows; GOARCH=amd64;   PACKAGE_OS=windows; PACKAGE_ARCH=amd64 ;;
            windows-386)       GOOS=windows; GOARCH=386;     PACKAGE_OS=windows; PACKAGE_ARCH=386 ;;
            windows-arm64)     GOOS=windows; GOARCH=arm64;   PACKAGE_OS=windows; PACKAGE_ARCH=arm64 ;;
            darwin-amd64)      GOOS=darwin; GOARCH=amd64;    PACKAGE_OS=darwin;  PACKAGE_ARCH=amd64 ;;
            darwin-arm64)      GOOS=darwin; GOARCH=arm64;    PACKAGE_OS=darwin;  PACKAGE_ARCH=arm64 ;;
            android-arm64)     GOOS=android; GOARCH=arm64;   PACKAGE_OS=android; PACKAGE_ARCH=arm64 ;;
          esac
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "GOOS=$GOOS" >> $GITHUB_ENV
          echo "GOARCH=$GOARCH" >> $GITHUB_ENV
          echo "PACKAGE_OS=$PACKAGE_OS" >> $GITHUB_ENV
          echo "PACKAGE_ARCH=$PACKAGE_ARCH" >> $GITHUB_ENV
          [ -n "$GOARM" ] && echo "GOARM=$GOARM" >> $GITHUB_ENV
          echo "CGO_ENABLED=0" >> $GITHUB_ENV

      - name: Build TVGate
        run: |
          mkdir -p build
          OUTPUT="build/TVGate-${PACKAGE_OS}-${PACKAGE_ARCH}"
          [ "$GOOS" = "windows" ] && OUTPUT="$OUTPUT.exe"
          go build -ldflags="-s -w -X 'github.com/qist/tvgate/config.Version=$VERSION'" -o $OUTPUT .
          echo "OUTPUT=$OUTPUT" >> $GITHUB_ENV

      - name: Prepare packaging
        run: |
          mkdir -p package
          cp README.md package/
          BIN_FILE="$OUTPUT"
          if [ -f "$BIN_FILE" ]; then
            cp "$BIN_FILE" package/
          else
            echo "Warning: $BIN_FILE not found, skipping..."
          fi
          if [ "$GOOS" != "windows" ]; then
          cp doc/TVGate.service package/ || true
          fi

      - name: Package into zip
        run: |
          mkdir -p build
          ZIP_FILE="build/TVGate-${PACKAGE_OS}-${PACKAGE_ARCH}.zip"
          cd package
          zip -r "../$ZIP_FILE" *
          cd ..
          echo "FILE=$ZIP_FILE" >> $GITHUB_ENV

      - name: Generate checksum .dgst
        run: |
          DGST="${FILE}.dgst"
          echo "MD5= $(md5sum $FILE | awk '{print $1}')"        >  "$DGST"
          echo "SHA1= $(sha1sum $FILE | awk '{print $1}')"     >> "$DGST"
          echo "SHA2-256= $(sha256sum $FILE | awk '{print $1}')" >> "$DGST"
          echo "SHA2-512= $(sha512sum $FILE | awk '{print $1}')" >> "$DGST"
          echo "CHECKSUM=$DGST" >> $GITHUB_ENV

      - name: Set asset names
        run: |
          FILE_NAME=$(basename "$FILE")
          CHECKSUM_NAME=$(basename "$CHECKSUM")
          echo "FILE_NAME=$FILE_NAME" >> $GITHUB_ENV
          echo "CHECKSUM_NAME=$CHECKSUM_NAME" >> $GITHUB_ENV
        shell: bash

      - name: Upload Release Asset (binary)
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          file: ${{ env.FILE }}
          asset_name: ${{ env.FILE_NAME }}
          prerelease: true
          overwrite: true

      - name: Upload Release Asset (checksum)
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          file: ${{ env.CHECKSUM }}
          asset_name: ${{ env.CHECKSUM_NAME }}
          prerelease: true
          overwrite: true
